<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nouvelle Demande de Service — IBM Maximo</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="card">
        <div class="header">
            <div class="header-icon">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" />
                </svg>
            </div>
            <div class="header-text">
                <h1>Nouvelle Demande de Service</h1>
                <p>IBM Maximo — Service Request Creation</p>
            </div>
        </div>

        <form id="woForm">

            <div class="section-label">Détails de la demande</div>

            <div class="field">
                <label for="description">Description <span class="req">*</span></label>
                <textarea id="description" name="description">problème de clavier</textarea>
            </div>

            <div class="row">
                <div class="field">
                    <label for="assetnum">Numéro d'actif <span class="req">*</span></label>
                    <input type="text" id="assetnum" name="assetnum" value="7507" />
                </div>
                <div class="field">
                    <label for="location">Localisation <span class="req">*</span></label>
                    <input type="text" id="location" name="location" value="REPAIR" />
                </div>
            </div>

            <div class="divider"></div>
            <div class="section-label">Personnes concernées</div>

            <div class="row">
                <div class="field">
                    <label for="reportedby">Déclaré par <span class="req">*</span></label>
                    <input type="text" id="reportedby" name="reportedby" value="Maria" />
                </div>
                <div class="field">
                    <label for="affectedpersonid">Personne affectée <span class="req">*</span></label>
                    <input type="text" id="affectedpersonid" name="affectedpersonid" value="MAXADMIN" />
                </div>
            </div>

            <div class="divider"></div>
            <div class="section-label">Statut & Site</div>

            <div class="row">
                <div class="field">
                    <label for="status">Statut <span class="req">*</span></label>
                    <select id="status" name="status">
                        <option value="NEW" selected>NEW</option>
                        <option value="WAPPR">WAPPR</option>
                        <option value="APPR">APPR</option>
                        <option value="INPRG">INPRG</option>
                        <option value="COMP">COMP</option>
                        <option value="CLOSE">CLOSE</option>
                        <option value="CAN">CAN</option>
                    </select>
                </div>
                <div class="field">
                    <label for="siteid">Site ID <span class="req">*</span></label>
                    <input type="text" id="siteid" name="SITEID" value="BEDFORD" />
                </div>
            </div>

            <div class="field">
                <div class="section-label endpoint-label">Endpoint cible</div>
                <div class="endpoint" id="endpointDisplay">
                    <span>POST</span> <span id="endpointUrl">Chargement...</span>
                </div>
            </div>

            <div class="submit-row">
                <button type="button" class="btn btn-secondary" id="resetBtn">Réinitialiser</button>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span id="btnLabel">Soumettre l'ordre</span>
                    <div class="spinner" id="spinner"></div>
                </button>
            </div>

        </form>

        <!-- Response panel -->
        <div class="response-panel" id="responsePanel">
            <div class="response-header">
                <div class="response-header-left">
                    ↩ Réponse du serveur
                </div>
            </div>
            <pre class="response-body" id="responseBody"></pre>
        </div>

    </div>


    <div class="toast" id="toast">
        <div class="toast-dot"></div>
        <span id="toastMsg"></span>
    </div>

    <script src="app.js"></script>
</body>

</html>
